<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NestKG — Вход для администраторов</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: #1a1f36; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-card .logo { font-size: 1.5rem; font-weight: 800; color: #1a1f36; }
    .login-card .logo span { color: #6c8fff; }
    .btn-admin { background: #6c8fff; border: none; color: #fff; border-radius: 8px; padding: .65rem 1rem; font-weight: 600; }
    .btn-admin:hover { background: #5a7aef; color: #fff; }
    .form-control { border-radius: 8px; }
    .form-control:focus { border-color: #6c8fff; box-shadow: 0 0 0 3px rgba(108,143,255,.2); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="logo mb-1">Nest<span style="color:#0D9488">KG</span></div>
      <div class="text-muted" style="font-size:.85rem;">Маркетплейс недвижимости</div>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2" style="font-size:.875rem;">
      <i class="bi bi-exclamation-circle me-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/admin/login">
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:.875rem;">Email</label>
        <input type="email" name="email" class="form-control" placeholder="admin@nestkg.com" required autofocus/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" style="font-size:.875rem;">Пароль</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-admin w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i> Войти
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
