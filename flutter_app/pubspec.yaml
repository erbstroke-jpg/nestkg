name: nestkg
description: NestKG - Real Estate Marketplace
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.6.0

  # Storage
  shared_preferences: ^2.3.3

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Map
  flutter_map: ^6.2.1
  latlong2: ^0.9.1

  # Utils
  url_launcher: ^6.3.1
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
